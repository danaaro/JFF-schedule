<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JFF 2026 — Aviv's Schedule</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #c8c8c8;
      --surface: #d4d4d4;
      --card: #dedede;
      --border: #aaa;
      --text: #111;
      --muted: #666;
      --silver-start: #d6d6d6;
      --silver-end: #ababab;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── Header ──────────────────────────────────────── */
    header {
      background: linear-gradient(to bottom, #d6d6d6, #ababab);
      border-bottom: 1px solid #888;
      padding: 20px 24px 0;
    }
    .header-top {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #111;
    }
    .subtitle {
      font-size: 13px;
      color: #444;
      font-weight: 400;
    }

    /* ── Day tabs ────────────────────────────────────── */
    .day-tabs {
      display: flex;
      gap: 3px;
      overflow-x: auto;
      padding-bottom: 0;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .day-tabs::-webkit-scrollbar { display: none; }

    .day-tab {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 7px 14px 8px;
      cursor: pointer;
      border-radius: 5px 5px 0 0;
      border: 1px solid #999;
      border-bottom: none;
      background: linear-gradient(to bottom, #e2e2e2, #c8c8c8);
      font-size: 11px;
      color: #333;
      transition: background 0.1s;
      position: relative;
      top: 1px;
      user-select: none;
    }
    .day-tab:hover {
      background: linear-gradient(to bottom, #ececec, #d4d4d4);
    }
    .day-tab.active {
      background: linear-gradient(to bottom, #f4f4f4, #e0e0e0);
      border-color: #888;
      border-bottom: 1px solid #e0e0e0;
      color: #000;
      z-index: 2;
    }
    .day-tab.has-events .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #555;
      margin-top: 4px;
    }
    .day-tab:not(.has-events) .dot { display: none; }
    .day-tab.active.has-events .dot { background: #222; }

    .tab-weekday { font-weight: 600; font-size: 12px; }
    .tab-date { font-size: 10px; color: #555; margin-top: 1px; }
    .day-tab.active .tab-date { color: #333; }

    /* ── Main content ────────────────────────────────── */
    main {
      padding: 28px 24px;
      max-width: 900px;
      margin: 0 auto;
    }

    .day-header {
      margin-bottom: 24px;
    }
    .day-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: #111;
    }
    .day-header p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── No events ───────────────────────────────────── */
    .empty-day {
      text-align: center;
      padding: 60px 20px;
      color: #999;
      font-size: 13px;
      letter-spacing: 0.05em;
      border: 1px dashed #bbb;
      border-radius: 6px;
    }

    /* ── Timeline ────────────────────────────────────── */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .screening-card {
      display: flex;
      gap: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      align-items: flex-start;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .screening-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    }

    .time-block {
      flex-shrink: 0;
      width: 52px;
      text-align: center;
    }
    .time-main {
      font-size: 18px;
      font-weight: 700;
      color: #111;
      line-height: 1;
    }
    .time-end {
      font-size: 10px;
      color: #888;
      margin-top: 3px;
    }

    .divider {
      width: 1px;
      background: #bbb;
      align-self: stretch;
      flex-shrink: 0;
    }

    .film-info {
      flex: 1;
      min-width: 0;
    }
    .film-title {
      font-size: 15px;
      font-weight: 600;
      color: #111;
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .film-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    /* Venue badges */
    .venue-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      border: 1px solid;
    }
    .venue-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Venue colors */
    .venue-sultans  { background: #f5e9d0; border-color: #c8a96e; color: #7a5a1e; }
    .venue-sultans .venue-dot { background: #c8a96e; }

    .venue-cinema1  { background: #d8e8f5; border-color: #7aaed4; color: #1e4a7a; }
    .venue-cinema1 .venue-dot { background: #7aaed4; }

    .venue-cinema2  { background: #e0d8f5; border-color: #9a8ad4; color: #3a1e7a; }
    .venue-cinema2 .venue-dot { background: #9a8ad4; }

    .venue-cinema3  { background: #d8f0e0; border-color: #7ac48a; color: #1e6a3a; }
    .venue-cinema3 .venue-dot { background: #7ac48a; }

    .venue-cinema4  { background: #d4f0f0; border-color: #6ac4c4; color: #1a5a5a; }
    .venue-cinema4 .venue-dot { background: #6ac4c4; }

    .venue-levsmadar { background: #f5ddd8; border-color: #d4826e; color: #7a2e1e; }
    .venue-levsmadar .venue-dot { background: #d4826e; }

    .venue-samshpiegel { background: #f0e8f5; border-color: #b08ad4; color: #4a1a7a; }
    .venue-samshpiegel .venue-dot { background: #b08ad4; }

    .venue-mediatek   { background: #fef5d0; border-color: #c8a000; color: #5a3d00; }
    .venue-mediatek .venue-dot { background: #c8a000; }

    .venue-other    { background: #ebebeb; border-color: #aaa; color: #444; }
    .venue-other .venue-dot { background: #aaa; }

    .duration {
      font-size: 11px;
      color: #888;
    }

    /* ── Google Calendar button ───────────────────────── */
    .gcal-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 500;
      color: #4285F4;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.1s, border-color 0.1s;
    }
    .gcal-btn:hover { background: #f0f4ff; border-color: #4285F4; }
    .gcal-btn svg { flex-shrink: 0; }

    .special-badge {
      display: inline-block;
      padding: 2px 8px;
      background: #222;
      color: #f0f0f0;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 3px;
    }

    /* ── Industry events ─────────────────────────────── */
    .industry-card {
      background: linear-gradient(to right, #fef5d0, #fdf0b8);
      border: 1px solid #c8a000;
      border-left: 3px solid #a07800;
    }
    .industry-card .film-title { color: #3a2800; }
    .industry-card .time-main { color: #3a2800; }
    .industry-card .time-end  { color: #8a6800; }
    .industry-card .divider   { background: #d4b040; }
    .industry-badge {
      display: inline-block;
      padding: 2px 7px;
      background: #a07800;
      color: #fff8e0;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 3px;
    }

    /* ── Priority / confirmed picks ─────────────────── */
    .priority-card {
      border-left: 3px solid #333;
      background: linear-gradient(to right, #d4d4d4, var(--card));
    }
    .priority-badge {
      display: inline-block;
      padding: 2px 7px;
      background: #222;
      color: #f0f0f0;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 3px;
    }

    /* ── Personal events ─────────────────────────────── */
    .personal-card {
      background: linear-gradient(135deg, #2a2a3a, #1a1a2a);
      border-color: #444;
      color: #e0e0e0;
    }
    .personal-card .film-title { color: #e0e0e0; }
    .personal-card .time-main { color: #e0e0e0; }
    .personal-card .time-end { color: #888; }
    .personal-card .divider { background: #444; }
    .personal-card .special-badge { background: #555; color: #f0f0f0; }

    /* ── Legend ──────────────────────────────────────── */
    .legend {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #bbb;
    }
    .legend-title {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 10px;
    }
    .legend-items {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* ── Calendar grid view ───────────────────────────── */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }
    .cal-cell {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      min-height: 120px;
      overflow: hidden;
    }
    .cal-cell.empty-cell {
      background: none;
      border: none;
      pointer-events: none;
    }
    .cal-cell-header {
      padding: 8px 10px 6px;
      border-bottom: 1px solid #bbb;
      background: linear-gradient(to bottom, #d8d8d8, #cccccc);
    }
    .cal-weekday {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
    }
    .cal-date {
      font-size: 18px;
      font-weight: 700;
      color: #111;
      line-height: 1.1;
    }
    .cal-cell-body {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .cal-film {
      display: flex;
      align-items: flex-start;
      gap: 5px;
      padding: 4px 7px;
      border-radius: 4px;
      border: 1px solid;
      font-size: 11px;
      line-height: 1.3;
    }
    .cal-film-time {
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
      font-size: 10px;
      margin-top: 1px;
    }
    .cal-film-title {
      font-weight: 500;
    }
    .cal-priority-star {
      flex-shrink: 0;
      font-size: 9px;
      margin-top: 2px;
    }

    /* Cal film venue colors (same palette) */
    .cal-cinema1  { background: #d8e8f5; border-color: #7aaed4; color: #1e4a7a; }
    .cal-cinema2  { background: #e0d8f5; border-color: #9a8ad4; color: #3a1e7a; }
    .cal-cinema3  { background: #d8f0e0; border-color: #7ac48a; color: #1e6a3a; }
    .cal-cinema4  { background: #d4f0f0; border-color: #6ac4c4; color: #1a5a5a; }
    .cal-levsmadar { background: #f5ddd8; border-color: #d4826e; color: #7a2e1e; }
    .cal-sultans   { background: #f5e9d0; border-color: #c8a96e; color: #7a5a1e; }
    .cal-other     { background: #ebebeb; border-color: #aaa; color: #444; }
    .cal-samshpiegel { background: #f0e8f5; border-color: #b08ad4; color: #4a1a7a; }
    .cal-mediatek    { background: #fef5d0; border-color: #c8a000; color: #5a3d00; }
    .cal-personal  { background: #2a2a3a; border-color: #444; color: #e0e0e0; }

    /* ── Footer note ─────────────────────────────────── */
    .note {
      margin-top: 32px;
      padding: 12px 16px;
      background: rgba(0,0,0,0.06);
      border-radius: 5px;
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }

    /* ── Responsive ──────────────────────────────────── */
    @media (max-width: 640px) {
      /* Header */
      header { padding: 14px 14px 0; }
      .header-top { flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
      h1 { font-size: 18px; }
      .subtitle { font-size: 11px; width: 100%; }

      /* Tabs — bigger touch targets */
      .day-tab { padding: 8px 10px 9px; }
      .tab-weekday { font-size: 11px; }
      .tab-date { font-size: 9px; }
      .day-tabs { gap: 2px; }

      /* Main */
      main { padding: 16px 12px; }
      #calendarView { padding: 12px; }

      /* Day header */
      .day-header { margin-bottom: 16px; }
      .day-header h2 { font-size: 16px; }

      /* Cards */
      .screening-card { padding: 11px 12px; gap: 11px; }
      .time-block { width: 42px; }
      .time-main { font-size: 15px; }
      .film-title { font-size: 13px; }
      .film-meta { gap: 5px; }
      .gcal-btn { padding: 4px 8px; font-size: 10px; }

      /* Legend */
      .legend { margin-top: 28px; }
      .legend-items { gap: 6px; }
      .venue-badge { font-size: 10px; padding: 3px 7px; }

      /* Calendar grid → vertical day list */
      .cal-grid {
        grid-template-columns: 1fr;
        gap: 5px;
      }
      .cal-col-header { display: none; }
      .cal-cell.empty-cell { display: none; }
      .cal-cell {
        display: flex;
        flex-direction: row;
        min-height: unset;
        border-radius: 5px;
      }
      .cal-cell-header {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-width: 56px;
        padding: 8px 8px;
        border-bottom: none;
        border-right: 1px solid #bbb;
        background: linear-gradient(to bottom, #d8d8d8, #cccccc);
      }
      .cal-weekday { font-size: 9px; }
      .cal-date { font-size: 16px; }
      .cal-cell-body {
        flex-direction: row;
        flex-wrap: wrap;
        align-items: center;
        padding: 6px 8px;
        gap: 4px;
      }
      .cal-film {
        font-size: 10px;
        padding: 3px 6px;
        line-height: 1.2;
      }
      .cal-film-time { font-size: 9px; }
    }

    /* Very small screens */
    @media (max-width: 380px) {
      .day-tab { padding: 7px 8px 8px; }
      .tab-weekday { font-size: 10px; }
      .cal-film-title { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>JFF 2026</h1>
    <span class="subtitle">Jerusalem Film Festival · July 9–19</span>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
</header>

<main>
  <div class="day-header" id="dayHeader">
    <h2 id="dayTitle"></h2>
    <p id="dayCount"></p>
  </div>
  <div id="dayContent"></div>

  <div class="legend">
    <div class="legend-title">Venues</div>
    <div class="legend-items">
      <span class="venue-badge venue-sultans"><span class="venue-dot"></span>Sultan's Pool</span>
      <span class="venue-badge venue-cinema1"><span class="venue-dot"></span>Cinematheque 1</span>
      <span class="venue-badge venue-cinema2"><span class="venue-dot"></span>Cinematheque 2</span>
      <span class="venue-badge venue-cinema3"><span class="venue-dot"></span>Cinematheque 3</span>
      <span class="venue-badge venue-cinema4"><span class="venue-dot"></span>Cinematheque 4</span>
      <span class="venue-badge venue-levsmadar"><span class="venue-dot"></span>Lev Smadar</span>
      <span class="venue-badge venue-samshpiegel"><span class="venue-dot"></span>Sam Shpiegel</span>
      <span class="venue-badge venue-mediatek"><span class="venue-dot"></span>MediaTek</span>
    </div>
  </div>

  <div class="note">
    11 films · 24 events. To add events, edit the <code>schedule</code> object in this file.
  </div>
</main>

<script>
// ── DATA ────────────────────────────────────────────────────────
// Add / edit screenings here. Each entry: { time, title, venue, duration, note, type }
// type: "jff" | "personal" | "work"

const schedule = {
  "2026-07-09": [
    { time: "20:00", title: "Tell Me Everything", venue: "Sultan's Pool", duration: 109, note: "Opening Night", type: "jff", priority: true },
  ],
  "2026-07-10": [
    { time: "10:30", title: "Short Films 1", venue: "Sam Shpiegel", duration: 90, type: "jff" },
    { time: "12:30", title: "Short Films 2", venue: "Sam Shpiegel", duration: 90, type: "jff" },
    { time: "21:00", title: "Cocktail Party", venue: "", duration: null, type: "personal" },
    { time: "22:30", title: "Barrio Triste", venue: "Cinematheque 2", duration: 88, type: "jff", priority: true },
  ],
  "2026-07-11": [
    { time: "10:30", title: "Short Movies", venue: "Sam Shpiegel", duration: 90, type: "jff" },
    { time: "21:00", title: "I Can't Say No to Myself", venue: "Cinematheque 1", duration: 99, type: "jff" },
  ],
  "2026-07-12": [
    { time: "10:00", title: "Industry Events", venue: "Cinematheque / MediaTek", duration: 540, type: "industry" },
    { time: "22:30", title: "Dead Mountaineer's Hotel", venue: "Cinematheque 2", duration: 84, type: "jff", priority: true },
  ],
  "2026-07-13": [
    { time: "17:00", title: "I Can't Say No to Myself", venue: "Cinematheque 3", duration: 99, type: "jff", note: "Backup" },
  ],
  "2026-07-14": [
    { time: "12:45", title: "Moulin", venue: "Cinematheque 3", duration: 130, type: "jff", priority: true },
    { time: "20:00", title: "Beyond the Walls", venue: "Cinematheque 3", duration: 103, type: "jff", priority: true },
  ],
  "2026-07-15": [
    { time: "14:15", title: "Fatherland", venue: "Cinematheque 3", duration: 82, type: "jff", priority: true },
  ],
  "2026-07-16": [
    { time: "17:00", title: "Odyssey", venue: "Beer Sheva", duration: null, note: "Beer Sheva", type: "personal" },
  ],
  "2026-07-17": [
    { time: "12:30", title: "Rose", venue: "Cinematheque 1", duration: 94, type: "jff" },
  ],
  "2026-07-18": [
    { time: "20:15", title: "Rose", venue: "Cinematheque 3", duration: 94, type: "jff" },
  ],
  "2026-07-19": [
    { time: "12:00", title: "SAI: Disaster", venue: "Cinematheque 3", duration: 128, type: "jff", priority: true },
    { time: "16:45", title: "Barrio Triste", venue: "Cinematheque 2", duration: 88, type: "jff", note: "Backup" },
  ],
};

// ── HELPERS ──────────────────────────────────────────────────────

const DAYS = Object.keys(schedule).sort();

const WEEKDAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS   = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function parseDate(str) {
  const [y, m, d] = str.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function formatDate(str) {
  const d = parseDate(str);
  return `${WEEKDAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;
}

function addMinutes(timeStr, mins) {
  const [h, m] = timeStr.split(":").map(Number);
  const total = h * 60 + m + mins;
  const endH = Math.floor(total / 60) % 24;
  const endM = total % 60;
  return `${String(endH).padStart(2,"0")}:${String(endM).padStart(2,"0")}`;
}

function venueClass(venue) {
  const v = venue.toLowerCase();
  if (v.includes("sultan")) return "venue-sultans";
  if (v.includes("cinema") && v.includes("1")) return "venue-cinema1";
  if (v.includes("cinema") && v.includes("2")) return "venue-cinema2";
  if (v.includes("cinema") && v.includes("3")) return "venue-cinema3";
  if (v.includes("cinema") && v.includes("4")) return "venue-cinema4";
  if (v.includes("smadar") || v.includes("lev")) return "venue-levsmadar";
  if (v.includes("sam") || v.includes("shpiegel")) return "venue-samshpiegel";
  if (v.includes("mediatek") || v.includes("media")) return "venue-mediatek";
  return "venue-other";
}

// ── GOOGLE CALENDAR URL ───────────────────────────────────────────

function toGCalDate(dateStr, timeStr) {
  // dateStr: "2026-07-10", timeStr: "22:30"
  const [y, m, d] = dateStr.split("-");
  const [h, min] = timeStr.split(":");
  return `${y}${m}${d}T${h}${min}00`;
}

function gcalUrl(ev, dateStr) {
  const start = toGCalDate(dateStr, ev.time);
  const endTime = ev.duration ? addMinutes(ev.time, ev.duration) : addMinutes(ev.time, 90);
  const end = toGCalDate(dateStr, endTime);
  const location = ev.venue ? `JFF 2026 — ${ev.venue}, Jerusalem` : "Jerusalem Film Festival 2026";
  const params = new URLSearchParams({
    action: "TEMPLATE",
    text: ev.title,
    dates: `${start}/${end}`,
    location,
    ctz: "Asia/Jerusalem",
  });
  return `https://calendar.google.com/calendar/render?${params.toString()}`;
}

// ── RENDER ────────────────────────────────────────────────────────

let activeDay = 'all';

function renderTabs() {
  const container = document.getElementById("dayTabs");
  const allTab = `
    <div class="day-tab${'all' === activeDay ? " active" : ""} has-events"
         onclick="selectDay('all')" style="padding:7px 18px 8px;font-weight:600;">
      <span class="tab-weekday" style="font-size:13px;letter-spacing:.03em">All</span>
      <span class="tab-date" style="font-size:9px;letter-spacing:.06em;text-transform:uppercase">Overview</span>
      <span class="dot"></span>
    </div>`;
  container.innerHTML = allTab + DAYS.map(day => {
    const hasEvents = schedule[day].length > 0;
    const d = parseDate(day);
    return `
      <div class="day-tab${day === activeDay ? " active" : ""}${hasEvents ? " has-events" : ""}"
           onclick="selectDay('${day}')">
        <span class="tab-weekday">${WEEKDAYS[d.getDay()]}</span>
        <span class="tab-date">Jul ${d.getDate()}</span>
        <span class="dot"></span>
      </div>`;
  }).join("");
}

function renderDay() {
  const dayHeader = document.getElementById("dayHeader");
  const content   = document.getElementById("dayContent");

  if (activeDay === 'all') {
    dayHeader.style.display = "none";
    renderCalendar();
    return;
  }

  dayHeader.style.display = "";
  const events = schedule[activeDay] || [];
  const sorted = [...events].sort((a, b) => a.time.localeCompare(b.time));

  document.getElementById("dayTitle").textContent = formatDate(activeDay);
  document.getElementById("dayCount").textContent =
    events.length === 0 ? "No screenings added yet" :
    `${events.length} screening${events.length > 1 ? "s" : ""}`;

  if (sorted.length === 0) {
    content.innerHTML = `
      <div class="empty-day">
        No screenings added for this day yet.
      </div>`;
    return;
  }

  content.innerHTML = `
    <div class="timeline">
      ${sorted.map(ev => {
        const endTime = ev.duration ? addMinutes(ev.time, ev.duration) : null;
        const isPersonal = ev.type === "personal" || ev.type === "work";
        const isIndustry = ev.type === "industry";
        return `
          <div class="screening-card${isPersonal ? " personal-card" : ""}${isIndustry ? " industry-card" : ""}${ev.priority ? " priority-card" : ""}">
            <div class="time-block">
              <div class="time-main">${ev.time}</div>
              ${endTime ? `<div class="time-end">→ ${endTime}</div>` : ""}
            </div>
            <div class="divider"></div>
            <div class="film-info">
              <div class="film-title">${ev.title}</div>
              <div class="film-meta">
                ${ev.venue && !isPersonal ? `
                  <span class="venue-badge ${venueClass(ev.venue)}">
                    <span class="venue-dot"></span>${ev.venue}
                  </span>` : ""}
                ${ev.duration ? `<span class="duration">${ev.duration} min</span>` : ""}
                ${isIndustry ? `<span class="industry-badge">Industry</span>` : ""}
                ${ev.priority ? `<span class="priority-badge">★ Priority</span>` : ""}
                ${ev.note ? `<span class="special-badge">${ev.note}</span>` : ""}
                <a href="${gcalUrl(ev, activeDay)}" target="_blank" rel="noopener" class="gcal-btn">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="#4285F4"><path d="M19 4h-1V2h-2v2H8V2H6v2H5C3.9 4 3 4.9 3 6v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/></svg>
                  + GCal
                </a>
              </div>
            </div>
          </div>`;
      }).join("")}
    </div>`;
}

function selectDay(day) {
  activeDay = day;
  renderTabs();
  renderDay();
}

// ── CALENDAR VIEW ────────────────────────────────────────────────

function calVenueClass(venue) {
  const v = (venue || "").toLowerCase();
  if (v.includes("sultan")) return "cal-sultans";
  if (v.includes("cinema") && v.includes("1")) return "cal-cinema1";
  if (v.includes("cinema") && v.includes("2")) return "cal-cinema2";
  if (v.includes("cinema") && v.includes("3")) return "cal-cinema3";
  if (v.includes("cinema") && v.includes("4")) return "cal-cinema4";
  if (v.includes("smadar") || v.includes("lev")) return "cal-levsmadar";
  if (v.includes("sam") || v.includes("shpiegel")) return "cal-samshpiegel";
  if (v.includes("mediatek") || v.includes("media")) return "cal-mediatek";
  if (v === "") return "cal-personal";
  return "cal-other";
}

function renderCalendar() {
  const FULL_WEEK = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const jul9Offset = 3; // Jul 9 is Thursday → 3 empty cells before it

  let html = `<div class="cal-grid">`;

  // Column headers
  html += FULL_WEEK.map(d =>
    `<div class="cal-col-header" style="text-align:center;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#666;padding:4px 0">${d}</div>`
  ).join("");

  for (let i = 0; i < jul9Offset; i++) {
    html += `<div class="cal-cell empty-cell"></div>`;
  }

  DAYS.forEach(day => {
    const d = parseDate(day);
    const events = [...(schedule[day] || [])].sort((a, b) => a.time.localeCompare(b.time));

    const filmsHtml = events.length === 0
      ? `<div style="padding:10px 8px;font-size:11px;color:#bbb;">—</div>`
      : events.map(ev => {
          const isPersonal = ev.type === "personal" || ev.type === "work";
          const cls = isPersonal ? "cal-personal" : calVenueClass(ev.venue);
          return `
            <div class="cal-film ${cls}">
              ${ev.priority ? `<span class="cal-priority-star">★</span>` : ""}
              <span class="cal-film-time">${ev.time}</span>
              <span class="cal-film-title">${ev.title}</span>
            </div>`;
        }).join("");

    html += `
      <div class="cal-cell" onclick="selectDay('${day}')" style="cursor:pointer" title="View ${formatDate(day)}">
        <div class="cal-cell-header">
          <div class="cal-weekday">${WEEKDAYS[d.getDay()]}</div>
          <div class="cal-date">${d.getDate()}</div>
        </div>
        <div class="cal-cell-body">${filmsHtml}</div>
      </div>`;
  });

  html += `</div>`;
  document.getElementById("dayContent").innerHTML = html;
}

// ── INIT ──────────────────────────────────────────────────────────

const today = new Date().toISOString().slice(0, 10);
if (DAYS.includes(today)) activeDay = today;
// else stays 'all'

renderTabs();
renderDay();
</script>
</body>
</html>
